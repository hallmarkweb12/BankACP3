<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BANK APP</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="app">
        <h1 class="heading1">Bank App</h1>
        <label>Transaction Amount</label>
        <input type="number" id="input" min="0"><br><br>
        <button class="btn1" onclick="debit()">Debit</button>
        <button class="btn2" onclick="credit()">Credit</button>
        <p id="error" style="color: red;"></p>
        <h3>$<span id="balance">0</span></h3>
    </div>
    <script src="script.js"></script>
</body>
</html>
